name: Integration auth rotation live matrix smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run matrix integration auth rotation live smoke
        env:
          INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_ENABLED: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_ENABLED }}
          MATRIX_BASE_URL: ${{ secrets.MATRIX_BASE_URL }}
          MATRIX_HOMESERVER_URL: ${{ secrets.MATRIX_HOMESERVER_URL }}
          MATRIX_LOGIN_TOKEN_TYPE: ${{ secrets.MATRIX_LOGIN_TOKEN_TYPE }}
          INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_LOGIN_TOKEN_VN: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_LOGIN_TOKEN_VN }}
          INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_LOGIN_TOKEN_VN1: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_LOGIN_TOKEN_VN1 }}
          INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_EXPECTED_USER_ID: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_MATRIX_EXPECTED_USER_ID }}
          INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN_ID: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN_ID }}
          INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN_VERSION: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN_VERSION }}
          INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN_MATERIAL: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN_MATERIAL }}
          INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN1_ID: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN1_ID }}
          INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN1_VERSION: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN1_VERSION }}
          INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN1_MATERIAL: ${{ secrets.INTEGRATION_AUTH_ROTATION_LIVE_KEY_VN1_MATERIAL }}
        run: npm run test:integration-auth-rotation-live:matrix
