name: Vercel Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Vercel credentials
        id: vercel_credentials
        run: |
          missing=()
          [[ -z "$VERCEL_TOKEN" ]] && missing+=("VERCEL_TOKEN")
          [[ -z "$VERCEL_ORG_ID" ]] && missing+=("VERCEL_ORG_ID")
          [[ -z "$VERCEL_PROJECT_ID" ]] && missing+=("VERCEL_PROJECT_ID")

          if (( ${#missing[@]} > 0 )); then
            echo "::warning::Skipping deploy because required Vercel secrets are missing: ${missing[*]}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel project settings
        if: steps.vercel_credentials.outputs.enabled == 'true'
        run: npx vercel@50.28.0 pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build prebuilt output
        if: steps.vercel_credentials.outputs.enabled == 'true'
        run: npx vercel@50.28.0 build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt output
        if: steps.vercel_credentials.outputs.enabled == 'true'
        run: npx vercel@50.28.0 deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Deploy skipped
        if: steps.vercel_credentials.outputs.enabled != 'true'
        run: echo "Vercel deploy skipped because required secrets are not configured."
