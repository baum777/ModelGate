name: Vercel Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel@50.28.0 pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build prebuilt output
        run: npx vercel@50.28.0 build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt output
        run: npx vercel@50.28.0 deploy --prebuilt --prod --token=$VERCEL_TOKEN
