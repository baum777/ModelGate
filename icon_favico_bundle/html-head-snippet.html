<!-- Transparent favicon: no circle/checkerboard background -->
<link rel="icon" href="/favicon/favicon-transparent.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon/favicon-transparent-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="/favicon/favicon-transparent-16.png" sizes="16x16">

<!-- Theme-aware app icons -->
<link rel="apple-touch-icon" href="/icons/light/apple-touch-icon-light-180.png" media="(prefers-color-scheme: light)">
<link rel="apple-touch-icon" href="/icons/dark/apple-touch-icon-dark-180.png" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="/manifest-light.webmanifest" media="(prefers-color-scheme: light)">
<link rel="manifest" href="/manifest-dark.webmanifest" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#010a20" media="(prefers-color-scheme: dark)">
